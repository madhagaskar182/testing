<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel ke JSON Pegawai</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f1f5f9;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 600px;
  margin: auto;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

textarea {
  width: 100%;
  height: 250px;
  margin-top: 10px;
  font-family: monospace;
}
</style>
</head>

<body>

<div class="card">
  <h2>Upload Excel → JSON Pegawai</h2>

  <input type="file" id="fileInput" accept=".xlsx, .xls">
  <button onclick="prosesExcel()">Convert ke JSON</button>

  <textarea id="output" placeholder="Hasil JSON muncul di sini..."></textarea>
</div>

<script>
async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2, '0')).join('');
}

async function prosesExcel() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) {
    alert("Pilih file Excel dulu!");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: 'array' });

    const sheetName = workbook.SheetNames[0];
    const sheet = workbook.Sheets[sheetName];

    const jsonData = XLSX.utils.sheet_to_json(sheet);

    let result = {};

    for (let row of jsonData) {
      const email = (row.email || "").toLowerCase().trim();
      const namaFile = (row.namaFile || "").trim();
      const password = (row.password || "").toString().trim();

      if (!email || !namaFile || !password) continue;

      const hashed = await hashPassword(password);

      result[email] = {
        namaFile: namaFile,
        password: hashed
      };
    }

    document.getElementById("output").value =
      JSON.stringify(result, null, 2);
  };

  reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
