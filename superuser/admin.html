<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard PRO+</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', monospace;
  background: #020617;
  color: #e2e8f0;
}

.wrapper { display: flex; }

/* LOGIN */
.login-box {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-card {
  background:#0f172a;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#0f172a;
  height:100vh;
  padding:20px;
}

.menu {
  padding:10px;
  cursor:pointer;
  border-radius:8px;
}
.menu:hover { background:#1e293b; }

/* CONTENT */
.content { flex:1; padding:20px; }

.card {
  background:#0f172a;
  padding:20px;
  border-radius:15px;
  max-width:900px;
}

/* FORM */
input,select,button,textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

button {
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

textarea {
  height:200px;
  background:#000;
  color:#22c55e;
}

/* FILE LIST */
.file-item {
  background:#020617;
  margin-top:5px;
  padding:8px;
  border-radius:8px;
}

.file-top {
  display:flex;
  justify-content:space-between;
}

.remove { color:red; cursor:pointer; }

/* PROGRESS */
.progress {
  height:6px;
  background:#1e293b;
  border-radius:10px;
  margin-top:5px;
}

.bar {
  height:100%;
  width:0%;
  background:#22c55e;
  border-radius:10px;
  transition:0.3s;
}

.hidden { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginPage">
  <div class="login-card">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="adminPass" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div class="wrapper hidden" id="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>⚡ ADMIN</h3>
  <div class="menu" onclick="showPage('dashboard')">Dashboard</div>
  <div class="menu" onclick="showPage('json')">JSON Generator</div>
  <div class="menu" onclick="showPage('upload')">Upload Slip Gaji</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD -->
<div id="dashboardPage" class="card">
  <h2>👋 Selamat Datang Admin</h2>
</div>

<!-- JSON -->
<div id="jsonPage" class="card hidden">
  <h2>JSON Generator</h2>

  <input type="file" id="excelFile">
  <button onclick="generateJSON()">Generate JSON</button>

  <textarea id="jsonOutput"></textarea>

  <input type="text" id="token" placeholder="GitHub Token">

  <button onclick="uploadJSON()">Upload ke GitHub</button>

  <div id="jsonStatus"></div>
</div>

<!-- UPLOAD PDF -->
<div id="uploadPage" class="card hidden">
  <h2>Upload Slip Gaji</h2>

  <select id="tahun">
    <option>2026</option>
    <option>2027</option>
  </select>

  <select id="bulan">
    <option value="01">Januari</option>
    <option value="02">Februari</option>
    <option value="03">Maret</option>
  </select>

  <input type="file" id="pdfFiles" multiple accept="application/pdf">

  <div id="fileList"></div>

  <button onclick="uploadAll()">Upload Semua</button>

  <div id="status"></div>
</div>

</div>
</div>

<script>

// ================= LOGIN =================
const ADMIN_HASH = "eb8dd3569264665279b7715826fcf2a291b074137704e18d06574f321fd91a58";

async function hash(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function login(){
  const pass = document.getElementById("adminPass").value;
  const h = await hash(pass);

  if(h === ADMIN_HASH){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").classList.remove("hidden");
  }else{
    alert("Password salah!");
  }
}

// ================= NAV =================
function showPage(p){
  dashboardPage.classList.add("hidden");
  jsonPage.classList.add("hidden");
  uploadPage.classList.add("hidden");

  if(p==="dashboard") dashboardPage.classList.remove("hidden");
  if(p==="json") jsonPage.classList.remove("hidden");
  if(p==="upload") uploadPage.classList.remove("hidden");
}

// ================= TOKEN AUTO =================
document.addEventListener("DOMContentLoaded", ()=>{
  document.getElementById("token").value = "ISI_TOKEN_KAMU_DISINI";
});

// ================= HASH PASSWORD =================
async function hashPass(p){
  const enc=new TextEncoder().encode(p);
  const buf=await crypto.subtle.digest("SHA-256",enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ================= JSON GENERATE =================
let jsonData = {};

async function generateJSON(){
  const f = document.getElementById("excelFile").files[0];
  if(!f) return alert("Upload Excel dulu");

  const r=new FileReader();
  r.onload=async e=>{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
    const data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

    let res={};

    for(let d of data){
      if(!d.email) continue;

      res[d.email.toLowerCase()] = {
        namaFile: d.namaFile.toUpperCase(),
        password: await hashPass(d.password)
      };
    }

    jsonData = res;
    jsonOutput.value = JSON.stringify(res,null,2);
  };

  r.readAsArrayBuffer(f);
}

// ================= UPLOAD JSON =================
async function uploadJSON(){

  if(Object.keys(jsonData).length===0)
    return alert("Generate dulu!");

  const token = document.getElementById("token").value;
  const status = document.getElementById("jsonStatus");

  status.innerText = "⏳ Uploading...";

  const repo="valios-idn/slip-gaji";
  const path="dataPegawai.json";

  const content = btoa(unescape(encodeURIComponent(JSON.stringify(jsonData,null,2))));
  const url=`https://api.github.com/repos/${repo}/contents/${path}`;

  try{
    let sha=null;

    const get=await fetch(url,{
      headers:{Authorization:`Bearer ${token}`}
    });

    if(get.ok){
      const d=await get.json();
      sha=d.sha;
    }

    const res=await fetch(url,{
      method:"PUT",
      headers:{
        Authorization:`Bearer ${token}`,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:"update dataPegawai",
        content:content,
        sha:sha
      })
    });

    if(!res.ok) throw new Error();

    status.innerText="✅ JSON berhasil diupload!";

  }catch(e){
    status.innerText="❌ Upload gagal!";
  }
}

// ================= FILE =================
let files=[];

pdfFiles.onchange=e=>{
  files=Array.from(e.target.files);
  renderFiles();
};

function renderFiles(){
  fileList.innerHTML="";

  files.forEach((f,i)=>{
    fileList.innerHTML+=`
      <div class="file-item">
        <div class="file-top">
          ${f.name}
          <span class="remove" onclick="removeFile(${i})">✖</span>
        </div>
        <div class="progress">
          <div class="bar" id="bar${i}"></div>
        </div>
        <small id="status${i}">Menunggu...</small>
      </div>
    `;
  });
}

function removeFile(i){
  files.splice(i,1);
  renderFiles();
}

// ================= UPLOAD PDF =================
async function uploadAll(){

  const token=document.getElementById("token").value;
  const th=tahun.value;
  const bl=bulan.value;

  for(let i=0;i<files.length;i++){
    await uploadSingle(files[i],i,token,th,bl);
  }

  status.innerText="✅ Semua upload selesai";
}

async function uploadSingle(file,i,token,th,bl){

  const bar=document.getElementById("bar"+i);
  const stat=document.getElementById("status"+i);

  stat.innerText="Upload...";

  const base64=await toBase64(file);

  const repo="valios-idn/slip-gaji";
  const path=`files/${th}/${bl}/${file.name}`;
  const url=`https://api.github.com/repos/${repo}/contents/${path}`;

  try{

    let sha=null;

    const get=await fetch(url,{
      headers:{Authorization:`Bearer ${token}`}
    });

    if(get.ok){
      const d=await get.json();
      sha=d.sha;
    }

    const res=await fetch(url,{
      method:"PUT",
      headers:{
        Authorization:`Bearer ${token}`,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:"upload slip",
        content:base64,
        sha:sha
      })
    });

    if(!res.ok) throw new Error();

    bar.style.width="100%";
    stat.innerText="✅ Berhasil";

  }catch{
    stat.innerText="❌ Gagal";
  }
}

// ================= BASE64 =================
function toBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.readAsDataURL(file);
  });
}

</script>
</body>
</html>
