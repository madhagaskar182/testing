<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard PRO+</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI', monospace;
  background:#020617;
  color:#e2e8f0;
}

/* LOGIN */
.login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.login-box{
  background:#0f172a;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

/* LAYOUT */
.wrapper{ display:flex; }

.sidebar{
  width:220px;
  background:#0f172a;
  height:100vh;
  padding:20px;
}

.menu{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}
.menu:hover{ background:#1e293b; }

.content{
  flex:1;
  padding:20px;
}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:15px;
  max-width:900px;
}

/* FORM */
input,select,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

/* FILE */
.file-item{
  background:#020617;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
}

.file-top{
  display:flex;
  justify-content:space-between;
}

.remove{
  color:red;
  cursor:pointer;
}

/* PROGRESS */
.progress{
  height:6px;
  background:#1e293b;
  border-radius:10px;
  margin-top:5px;
}

.bar{
  height:100%;
  width:0%;
  background:#22c55e;
}

/* TOKEN */
.token-box{
  margin-top:10px;
}

/* OUTPUT */
textarea{
  width:100%;
  height:200px;
  background:#000;
  color:#22c55e;
  margin-top:10px;
  border-radius:10px;
  padding:10px;
}

/* HIDDEN */
.hidden{ display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
  <div class="login-box">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="adminPass" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div class="wrapper hidden" id="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>⚡ ADMIN</h3>
  <div class="menu" onclick="showPage('dashboard')">Dashboard</div>
  <div class="menu" onclick="showPage('json')">JSON Generator</div>
  <div class="menu" onclick="showPage('upload')">Upload Slip</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD -->
<div id="dashboardPage" class="card">
  <h2>👋 Selamat Datang Admin</h2>
</div>

<!-- JSON -->
<div id="jsonPage" class="card hidden">
  <h2>JSON Generator</h2>

  <input type="file" id="excelFile">

  <div id="jsonFileList"></div>

  <button onclick="generateJSON()">Generate JSON</button>

  <!-- TOKEN -->
  <input type="text" id="tokenJson">

  <button onclick="uploadJSON()">Upload JSON ke GitHub</button>

  <textarea id="jsonOutput"></textarea>
</div>

<!-- UPLOAD -->
<div id="uploadPage" class="card hidden">
  <h2>Upload Slip Gaji</h2>

  <select id="tahun">
    <option>2026</option>
    <option>2027</option>
  </select>

  <select id="bulan">
    <option value="01">Januari</option>
    <option value="02">Februari</option>
    <option value="03">Maret</option>
    <option value="04">April</option>
    <option value="05">Mei</option>
    <option value="06">Juni</option>
    <option value="07">Juli</option>
    <option value="08">Agustus</option>
    <option value="09">September</option>
    <option value="10">Oktober</option>
    <option value="11">November</option>
    <option value="12">Desember</option>
  </select>

  <input type="file" id="pdfFiles" multiple accept="application/pdf">

  <div id="fileList"></div>

  <!-- TOKEN -->
  <input type="text" id="tokenUpload">

  <button onclick="uploadAll()">Upload Semua</button>

  <div id="status"></div>
</div>

</div>
</div>

<script>
// ================= LOGIN =================
const ADMIN_HASH = "eb8dd3569264665279b7715826fcf2a291b074137704e18d06574f321fd91a58";

async function hash(t){
  const e=new TextEncoder().encode(t);
  const b=await crypto.subtle.digest("SHA-256",e);
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

async function login(){
  const h=await hash(adminPass.value);
  if(h===ADMIN_HASH){
    loginPage.classList.add("hidden");
    app.classList.remove("hidden");
  } else alert("Password salah!");
}

// ================= NAV =================
function showPage(p){
  dashboardPage.classList.add("hidden");
  jsonPage.classList.add("hidden");
  uploadPage.classList.add("hidden");

  if(p==="dashboard") dashboardPage.classList.remove("hidden");
  if(p==="json") jsonPage.classList.remove("hidden");
  if(p==="upload") uploadPage.classList.remove("hidden");
}

// ================= AUTO TOKEN =================
const DEFAULT_TOKEN = "_pat_11CAL3MIA03YlOdbk6DTFt_K7vkaYfLDFxgt5w5chcvjunGjaWA79oRknfplcB62Df4IBWLSBJw41Bw1j1";

tokenJson.value = DEFAULT_TOKEN;
tokenUpload.value = DEFAULT_TOKEN;

// ================= HASH PASS =================
async function hashPass(p){
  const e=new TextEncoder().encode(p);
  const b=await crypto.subtle.digest("SHA-256",e);
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

// ================= JSON =================
let jsonData={};

excelFile.onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;

  jsonFileList.innerHTML=`
    <div class="file-item">
      ${f.name}
      <span class="remove" onclick="removeExcel()">✖</span>
    </div>`;
};

function removeExcel(){
  excelFile.value="";
  jsonFileList.innerHTML="";
}

async function generateJSON(){
  const f=excelFile.files[0];
  if(!f) return alert("Upload Excel!");

  const r=new FileReader();
  r.onload=async e=>{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
    const data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

    let res={};

    for(let d of data){
      if(!d.email) continue;
      res[d.email.toLowerCase()]={
        namaFile:d.namaFile.toUpperCase(),
        password:await hashPass(d.password)
      };
    }

    jsonData=res;
    jsonOutput.value=JSON.stringify(res,null,2);
  };
  r.readAsArrayBuffer(f);
}

// ================= UPLOAD JSON =================
async function uploadJSON(){
  const token=tokenJson.value;

  const content=btoa(unescape(encodeURIComponent(JSON.stringify(jsonData,null,2))));
  const url="https://api.github.com/repos/valios-idn/slip-gaji/contents/dataPegawai.json";

  await fetch(url,{
    method:"PUT",
    headers:{
      Authorization:`Bearer ${token}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:"update json",
      content:content
    })
  });

  alert("JSON Uploaded!");
}

// ================= FILE =================
let files=[];

pdfFiles.onchange=e=>{
  files=Array.from(e.target.files);
  renderFiles();
};

function renderFiles(){
  fileList.innerHTML="";

  files.forEach((f,i)=>{
    fileList.innerHTML+=`
    <div class="file-item">
      <div class="file-top">
        ${f.name}
        <span class="remove" onclick="removeFile(${i})">✖</span>
      </div>
      <div class="progress"><div class="bar" id="bar${i}"></div></div>
      <small id="status${i}">Menunggu...</small>
    </div>`;
  });
}

function removeFile(i){
  files.splice(i,1);
  renderFiles();
}

// ================= UPLOAD =================
async function uploadAll(){
  const token=tokenUpload.value;

  for(let i=0;i<files.length;i++){
    await uploadSingle(files[i],i,token);
  }

  status.innerText="✅ Selesai";
}

async function uploadSingle(file,i,token){
  const bar=document.getElementById("bar"+i);
  const stat=document.getElementById("status"+i);

  stat.innerText="Convert...";
  const base64=await toBase64(file);

  bar.style.width="30%";

  const path=`files/${tahun.value}/${bulan.value}/${file.name}`;
  const url=`https://api.github.com/repos/valios-idn/slip-gaji/contents/${path}`;

  stat.innerText="Upload...";

  await fetch(url,{
    method:"PUT",
    headers:{
      Authorization:`Bearer ${token}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:"upload slip",
      content:base64
    })
  });

  bar.style.width="100%";
  stat.innerText="✅ Berhasil";
}

// ================= BASE64 =================
function toBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.readAsDataURL(file);
  });
}
</script>

</body>
</html>
