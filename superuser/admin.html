<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Generator JSON Pegawai</title>
    <link rel="stylesheet" href="style-admin.css">
    <script defer src="admin.js"></script>
</head>
<body>

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="login-box">
        <h2>🔐 Login Admin</h2>
        <form id="loginForm">
            <label for="username">Username</label>
            <input type="text" id="username" autocomplete="username" required>

            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password" required>

            <button type="submit" class="btn-primary">Login</button>
        </form>
        <p id="loginError" class="error-text"></p>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="container hidden">
        <h2>🧑‍💼 Generator JSON Pegawai</h2>
        
        <div class="top-actions">
            <button type="button" class="btn-primary" onclick="tambahBaris()">
                ➕ Tambah Baris
            </button>
            <button type="button" class="btn-success" onclick="generateJSON()">
                🚀 Generate JSON
            </button>
            <button type="button" class="btn-copy" onclick="copyJSON()">
                📋 Copy JSON
            </button>
            <button type="button" class="btn-danger" onclick="logout()">
                🚪 Logout
            </button>
        </div>

        <div class="table-wrapper">
            <table id="table">
                <thead>
                    <tr>
                        <th>NIP (18 digit)</th>
                        <th>Nama File</th>
                        <th>Password</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Baris pertama default -->
                    <tr>
                        <td><input type="text" placeholder="NIP" maxlength="18"></td>
                        <td><input type="text" placeholder="Nama File"></td>
                        <td><input type="text" placeholder="Password"></td>
                        <td><button class="btn-danger" onclick="hapusBaris(this)">❌</button></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="output">
            <h3>Hasil JSON:</h3>
            <pre id="output"></pre>
        </div>
    </div>

</body>
</html>
