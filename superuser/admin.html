<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard PRO+</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI', monospace;
  background:#020617;
  color:#e2e8f0;
}

/* LOGIN */
.login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.login-box{
  background:#0f172a;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

/* LAYOUT */
.wrapper{ display:flex; }

.sidebar{
  width:220px;
  background:#0f172a;
  height:100vh;
  padding:20px;
}

.menu{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}
.menu:hover{ background:#1e293b; }

.content{
  flex:1;
  padding:20px;
}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:15px;
  max-width:900px;
}

/* FORM */
input,select,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

/* DROP AREA */
.drop-area{
  border:2px dashed #334155;
  padding:30px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
  margin-top:10px;
}

.drop-area:hover{
  border-color:#3b82f6;
  background:rgba(59,130,246,0.1);
}

.drop-area.drag{
  border-color:#22c55e;
  background:rgba(34,197,94,0.1);
}

/* FILE */
.file-item{
  background:#020617;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
}

.file-top{
  display:flex;
  justify-content:space-between;
}

.remove{
  color:red;
  cursor:pointer;
}

/* PROGRESS */
.progress{
  height:6px;
  background:#1e293b;
  border-radius:10px;
  margin-top:5px;
}
.bar{
  height:100%;
  width:0%;
  background:#22c55e;
}

/* OUTPUT */
textarea{
  width:100%;
  height:200px;
  background:#000;
  color:#22c55e;
  margin-top:10px;
  border-radius:10px;
  padding:10px;
}

.hidden{ display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
  <div class="login-box">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="adminPass">
    <button onclick="login()">Login</button>
  </div>
</div>

<div class="wrapper hidden" id="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>⚡ ADMIN</h3>
  <div class="menu" onclick="showPage('dashboard')">Dashboard</div>
  <div class="menu" onclick="showPage('json')">JSON Generator</div>
  <div class="menu" onclick="showPage('upload')">Upload Slip</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD -->
<div id="dashboardPage" class="card">
  <h2>👋 Selamat Datang</h2>
</div>

<!-- JSON -->
<div id="jsonPage" class="card hidden">
  <h2>JSON Generator</h2>

  <div class="drop-area" id="excelDrop">
    📊 Drag & Drop Excel / Klik
    <input type="file" id="excelFile" hidden>
  </div>

  <div id="jsonFileList"></div>

  <button onclick="generateJSON()">Generate JSON</button>

  <input type="text" id="tokenJson">

  <button onclick="uploadJSON()">Upload JSON</button>

  <textarea id="jsonOutput"></textarea>
</div>

<!-- UPLOAD -->
<div id="uploadPage" class="card hidden">
  <h2>Upload Slip Gaji</h2>

  <select id="tahun">
    <option>2026</option>
    <option>2027</option>
  </select>

  <select id="bulan">
    <option value="01">Januari</option>
    <option value="02">Februari</option>
  </select>

  <div class="drop-area" id="pdfDrop">
    📂 Drag & Drop PDF / Klik
    <input type="file" id="pdfFiles" multiple hidden>
  </div>

  <div id="fileList"></div>

  <input type="text" id="tokenUpload">

  <button onclick="uploadAll()">Upload Semua</button>

  <div id="status"></div>
</div>

</div>
</div>

<script>
// LOGIN
const ADMIN_HASH="eb8dd3569264665279b7715826fcf2a291b074137704e18d06574f321fd91a58";

async function hash(t){
  const e=new TextEncoder().encode(t);
  const b=await crypto.subtle.digest("SHA-256",e);
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

async function login(){
  if(await hash(adminPass.value)===ADMIN_HASH){
    loginPage.classList.add("hidden");
    app.classList.remove("hidden");
  } else alert("Salah!");
}

// NAV
function showPage(p){
  dashboardPage.classList.add("hidden");
  jsonPage.classList.add("hidden");
  uploadPage.classList.add("hidden");

  if(p==="dashboard") dashboardPage.classList.remove("hidden");
  if(p==="json") jsonPage.classList.remove("hidden");
  if(p==="upload") uploadPage.classList.remove("hidden");
}

// TOKEN AUTO
const TOKEN="_pat_11CAL3MIA03YlOdbk6DTFt_K7vkaYfLDFxgt5w5chcvjunGjaWA79oRknfplcB62Df4IBWLSBJw41Bw1j1";
tokenJson.value=TOKEN;
tokenUpload.value=TOKEN;

// DRAG JSON
excelDrop.onclick=()=>excelFile.click();
excelDrop.ondrop=e=>{
  e.preventDefault();
  excelFile.files=e.dataTransfer.files;
  showExcel();
};
excelDrop.ondragover=e=>e.preventDefault();
excelFile.onchange=showExcel;

function showExcel(){
  const f=excelFile.files[0];
  if(!f) return;
  jsonFileList.innerHTML=`<div class="file-item">${f.name} <span class="remove" onclick="excelFile.value='';jsonFileList.innerHTML=''">✖</span></div>`;
}

// JSON GENERATE
async function hashPass(p){
  const e=new TextEncoder().encode(p);
  const b=await crypto.subtle.digest("SHA-256",e);
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

let jsonData={};

async function generateJSON(){
  const f=excelFile.files[0];
  const r=new FileReader();
  r.onload=async e=>{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
    const data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    let res={};
    for(let d of data){
      res[d.email.toLowerCase()]={namaFile:d.namaFile.toUpperCase(),password:await hashPass(d.password)};
    }
    jsonData=res;
    jsonOutput.value=JSON.stringify(res,null,2);
  };
  r.readAsArrayBuffer(f);
}

// UPLOAD JSON
async function uploadJSON(){
  const token=tokenJson.value;
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(jsonData,null,2))));
  await fetch("https://api.github.com/repos/valios-idn/slip-gaji/contents/dataPegawai.json",{
    method:"PUT",
    headers:{Authorization:`Bearer ${token}`},
    body:JSON.stringify({message:"update",content})
  });
  alert("Upload JSON berhasil");
}

// PDF
let files=[];
pdfDrop.onclick=()=>pdfFiles.click();
pdfFiles.onchange=e=>{files=Array.from(e.target.files);renderFiles();};

function renderFiles(){
  fileList.innerHTML="";
  files.forEach((f,i)=>{
    fileList.innerHTML+=`
    <div class="file-item">
      <div class="file-top">${f.name}<span class="remove" onclick="removeFile(${i})">✖</span></div>
      <div class="progress"><div class="bar" id="bar${i}"></div></div>
    </div>`;
  });
}

function removeFile(i){files.splice(i,1);renderFiles();}

// UPLOAD PDF
async function uploadAll(){
  for(let i=0;i<files.length;i++){
    const base64=await toBase64(files[i]);
    document.getElementById("bar"+i).style.width="100%";

    await fetch(`https://api.github.com/repos/valios-idn/slip-gaji/contents/files/${tahun.value}/${bulan.value}/${files[i].name}`,{
      method:"PUT",
      headers:{Authorization:`Bearer ${tokenUpload.value}`},
      body:JSON.stringify({message:"upload",content:base64})
    });
  }
  status.innerText="Selesai";
}

// BASE64
function toBase64(file){
  return new Promise(r=>{
    const fr=new FileReader();
    fr.onload=()=>r(fr.result.split(',')[1]);
    fr.readAsDataURL(file);
  });
}
</script>

</body>
</html>
