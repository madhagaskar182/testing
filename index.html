<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Slip Gaji Pegawai</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(to bottom, #e0f2fe, #bae6fd);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
      text-align: center;
    }

    .logo {
      width: 120px;
      margin-bottom: 10px;
    }

    h1 {
      color: #1e40af;
      margin-bottom: 1rem;
    }

    form {
      text-align: left;
    }

    select, input {
      width: 100%;
      padding: 0.8rem;
      margin-top: 8px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #94a3b8;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 0.9rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    #viewerContainer {
      margin-top: 20px;
      display: none;
    }

    canvas {
      width: 100%;
      border: 1px solid #ccc;
      margin-top: 10px;
      border-radius: 8px;
    }

    .download-btn {
      background: #16a34a;
      margin-top: 10px;
    }

    .error {
      color: red;
      margin-top: 10px;
    }

    #pesan {
      margin-top: 10px;
      color: #1e40af;
    }
  </style>
</head>
<body>

<div class="card">
  
  <img src="images/logo.png" alt="Logo" class="logo">

  <h1>Slip Gaji Pegawai</h1>

  <form id="pdfForm">
    <select id="tahun" required>
      <option value="">Pilih Tahun</option>
      <option value="2026">2026</option>
      <option value="2027">2027</option>
    </select>

    <select id="bulan" required>
      <option value="">Pilih Bulan</option>
      <option value="01">Januari</option>
      <option value="02">Februari</option>
    </select>

    <input type="text" id="nama" placeholder="Nama file (tanpa .pdf)" required />

    <button type="submit">Tampilkan PDF</button>
  </form>

  <div id="pesan"></div>
  <div id="error" class="error"></div>

  <div id="viewerContainer">
    <canvas id="pdfCanvas"></canvas>
    <button id="downloadBtn" class="download-btn">Download PDF</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
