<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payroll SaaS</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="brand">Payroll App</h2>
    <p class="menu active">Slip Gaji</p>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <h1>Slip Gaji Pegawai</h1>
    </div>

    <div class="content">

      <!-- FORM -->
      <div class="card">
        <form id="pdfForm">

          <label>Tahun</label>
          <select id="tahun" required>
            <option value="">Pilih Tahun</option>
            <option value="2026">2026</option>
            <option value="2027">2027</option>
          </select>

          <label>Bulan</label>
          <select id="bulan" required>
            <option value="">Pilih Bulan</option>
            <option value="01">Januari</option>
            <option value="02">Februari</option>
            <option value="03">Maret</option>
            <option value="04">April</option>
            <option value="05">Mei</option>
            <option value="06">Juni</option>
            <option value="07">Juli</option>
            <option value="08">Agustus</option>
            <option value="09">September</option>
            <option value="10">Oktober</option>
            <option value="11">November</option>
            <option value="12">Desember</option>
          </select>

          <label>Email</label>
          <input type="email" id="email" required>

          <label>Password</label>
          <div class="password-box">
            <input type="password" id="password">
            <span data-toggle="#password" class="fa-regular toggle-password fa-eye"></span>
          </div>

          <button type="submit">Tampilkan Slip</button>

        </form>

        <div id="pesan"></div>
        <div id="error" class="error"></div>
      </div>

      <!-- VIEWER -->
      <div id="viewerContainer" class="viewer hidden">
        <button id="downloadBtn" class="download-btn">Download PDF</button>
        <div id="pdfViewer"></div>
      </div>

    </div>

  </main>

</div>

<script src="script.js"></script>

</body>
</html>
