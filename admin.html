<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #e0f2fe, #bae6fd);
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  color: #1e40af;
}

.grid {
  display: grid;
  gap: 10px;
}

input, select, button {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #2563eb;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.preview {
  margin-top: 15px;
  background: #f1f5f9;
  padding: 10px;
  border-radius: 8px;
  max-height: 200px;
  overflow: auto;
}

.success {
  color: green;
  margin-top: 10px;
}

.file-list {
  font-size: 13px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>📂 Dashboard Admin Upload PDF</h2>

<div class="grid">

<select id="tahun">
  <option value="">Pilih Tahun</option>
</select>

<select id="bulan">
  <option value="">Pilih Bulan</option>
  <option value="01">Januari</option>
  <option value="02">Februari</option>
  <option value="03">Maret</option>
  <option value="04">April</option>
  <option value="05">Mei</option>
  <option value="06">Juni</option>
  <option value="07">Juli</option>
  <option value="08">Agustus</option>
  <option value="09">September</option>
  <option value="10">Oktober</option>
  <option value="11">November</option>
  <option value="12">Desember</option>
</select>

<input type="file" id="pdfFiles" multiple accept="application/pdf">

<button onclick="prosesUpload()">🚀 Proses Data</button>

</div>

<div class="file-list" id="fileList"></div>

<h3>📄 JSON Output</h3>
<pre class="preview" id="output"></pre>

<div class="success" id="status"></div>

</div>

<script>
// AUTO TAHUN
const tahunSelect = document.getElementById('tahun');
const currentYear = new Date().getFullYear();

for (let i = currentYear - 1; i <= currentYear + 2; i++) {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = i;
  tahunSelect.appendChild(opt);
}
tahunSelect.value = currentYear;

// HASH PASSWORD
async function hashPassword(password) {
  const data = new TextEncoder().encode(password);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash))
    .map(b => b.toString(16).padStart(2, '0')).join('');
}

// LIST FILE
document.getElementById('pdfFiles').addEventListener('change', function() {
  const list = [...this.files].map(f => f.name).join('<br>');
  document.getElementById('fileList').innerHTML = "<b>File dipilih:</b><br>" + list;
});

// PROSES
async function prosesUpload() {
  const tahun = document.getElementById('tahun').value;
  const bulan = document.getElementById('bulan').value;
  const files = document.getElementById('pdfFiles').files;

  if (!tahun || !bulan || files.length === 0) {
    alert("Lengkapi semua data!");
    return;
  }

  const data = {};

  for (const file of files) {
    const namaFile = file.name.replace('.pdf', '');

    // Ambil NIP dari nama file (asumsi di awal nama)
    const nipMatch = namaFile.match(/\d{18}/);

    if (!nipMatch) continue;

    const nip = nipMatch[0];

    // password default: tanggal lahir dari NIP (YYYYMMDD → dibalik)
    const tgl = nip.substring(6, 14);
    const password = tgl.substring(6,8) + tgl.substring(4,6) + tgl.substring(0,4);

    const hashed = await hashPassword(password);

    data[nip] = {
      namaFile: namaFile,
      password: hashed
    };
  }

  document.getElementById('output').textContent =
    JSON.stringify(data, null, 2);

  document.getElementById('status').innerHTML =
    "✅ JSON siap! Upload PDF ke:<br><b>files/" + tahun + "/" + bulan + "/</b>";
}
</script>

</body>
</html>
